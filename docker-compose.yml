services:
  postgres:
    image: postgres:16-alpine
    container_name: synthea-postgres
    environment:
      POSTGRES_DB: synthea
      POSTGRES_USER: synthea
      POSTGRES_PASSWORD: synthea_dev
    ports:
      - "5432:5432"
    volumes:
      - synthea_pgdata:/var/lib/postgresql/data
      - ./data/raw:/data/raw:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthea -d synthea"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  synthea_pgdata: